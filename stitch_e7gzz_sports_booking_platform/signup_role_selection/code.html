<!-- Header Branding -->

<h1 class="font-headline text-4xl font-black tracking-tighter text-primary mb-2">e7gzz</h1>
<p class="font-headline text-2xl font-bold text-on-surface">Join the Arena</p>
<p class="text-on-secondary-container mt-2">Choose your path and start your sports journey in Egypt.</p>
</header>
<!-- Role Selection -->
<section class="mb-10">
<h2 class="text-sm font-label font-bold uppercase tracking-widest text-on-secondary-container mb-6 text-center">Select Your Role</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Player Role -->
<button class="role-card relative group text-left p-8 rounded-xl surface-container border-2 border-transparent transition-all duration-300 hover:border-primary/50 overflow-hidden">

<div class="relative z-10">
<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary mb-6">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Player</h3>
<p class="text-sm text-on-secondary-container leading-relaxed">Book pitches, find teammates, and join matches in your neighborhood.</p>
</div>
<div class="absolute top-4 right-4">
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-colors">
<div class="w-3 h-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</div>
</button>
<!-- Pitch Owner Role -->

<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary-container mb-6">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">stadium</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Pitch Owner</h3>
<p class="text-sm text-on-secondary-container leading-relaxed">List your stadium, manage bookings, and grow your sports business.</p>
</div>
<div class="absolute top-4 right-4">
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-colors">
<div class="w-3 h-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</div>
</button>
</div>

<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-secondary-container">person</span>
<input class="w-full bg-surface-container border-0 rounded-full py-4 pl-14 pr-6 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all" id="full-name" placeholder="Mohamed Ahmed" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-label font-bold text-on-surface-variant ml-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-secondary-container">mail</span>
<input class="w-full bg-surface-container border-0 rounded-full py-4 pl-14 pr-6 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all" id="email" placeholder="mohamed@example.com" type="email"/>
</div>
</div>

</div>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-sm font-label font-bold text-on-surface-variant ml-2" for="password">Create Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-secondary-container">lock</span>
<input class="w-full bg-surface-container border-0 rounded-full py-4 pl-14 pr-14 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-on-secondary-container hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>

<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-headline font-extrabold text-lg py-5 rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">

<p class="text-sm text-on-secondary-container">

</p>
</div>
</form>
