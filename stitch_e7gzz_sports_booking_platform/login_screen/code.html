<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[100px]"></div>
<main class="w-full max-w-md z-10">
<!-- Brand Identity (Suppressing Nav for Login) -->
<div class="text-center mb-10">
<h1 class="font-headline font-black text-5xl tracking-tighter text-primary mb-2">e7gzz</h1>
<p class="text-secondary font-label uppercase tracking-widest text-xs opacity-70">The Stadium is Calling</p>
</div>
<!-- Login Container -->
<div class="surface-container-low rounded-xl p-8 lg:p-10 shadow-2xl relative overflow-hidden">
<!-- Section Header -->
<div class="mb-8">
<h2 class="font-headline font-bold text-2xl text-on-surface mb-2">Welcome Back</h2>
<p class="text-secondary text-sm">Securely log in to manage your bookings.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-slate-400 ml-1">EMAIL ADDRESS</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-14 bg-surface-container rounded-xl pl-12 pr-4 text-on-surface placeholder:text-slate-600 border-0 outline-none focus:ring-2 focus:ring-primary/40 transition-all font-body" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold text-slate-400">PASSWORD</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-14 bg-surface-container rounded-xl pl-12 pr-4 text-on-surface placeholder:text-slate-600 border-0 outline-none focus:ring-2 focus:ring-primary/40 transition-all font-body" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-surface-container-lowest font-headline font-extrabold text-lg rounded-full shadow-lg hover:scale-[1.02] active:scale-95 transition-all" type="submit">
          Login to Account
        </button>
</form>
<!-- Divider -->
<div class="relative my-8 text-center">
<span class="bg-surface-container-low px-4 text-xs font-bold text-slate-500 uppercase tracking-widest relative z-10">or continue with</span>
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-slate-800"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container rounded-xl hover:bg-surface-container-high transition-all active:scale-95 group">
<img alt="Google" class="w-5 h-5 opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Google logo icon in multi-color on a white circle with clean digital vector style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYoHclKuOmfYft8b08VLVKqZUoP45tVICPswuI_PNIhpuHmzRqJDD_1c1HNz7mop5DaSHp9SwUqaiD6q-DERJD-RcsItTjeXDgyk1d3SSQ6nZY9SDJWV4k9tgh5dwiCE-HMY4jta6Dl3WZCCrmtnPNkxdSMveMqBdWYYjns_iB8wJQzGck40npmKI0Y2v7Pr36RY46ADKNermQN1j5hFNmVFRsxNI4xaF4exUx9vrcrXd1AkZv0coImV4BMKpJHzvHSDiytZEaeQ"/>
<span class="font-label text-sm font-bold">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container rounded-xl hover:bg-surface-container-high transition-all active:scale-95 group">
<svg class="w-5 h-5 fill-slate-300 group-hover:fill-blue-500 transition-colors" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
<span class="font-label text-sm font-bold">Facebook</span>
</button>
</div>
<!-- Footer Action -->
<p class="text-center mt-8 text-sm text-secondary">
        New to the pitch? 
        <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Create an account</a>
</p>
</div>
<!-- Legal/Footer -->
<div class="mt-8 flex justify-center gap-6">
<a class="text-[10px] uppercase tracking-widest font-bold text-slate-500 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-widest font-bold text-slate-500 hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-[10px] uppercase tracking-widest font-bold text-slate-500 hover:text-primary transition-colors" href="#">Support</a>
</div>
