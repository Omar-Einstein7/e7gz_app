<style>
        .glass-glow {
            background: radial-gradient(circle at center, rgba(75, 226, 119, 0.15) 0%, rgba(11, 19, 38, 0) 70%);
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(75, 226, 119, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .loader-ring {
            border: 2px solid transparent;
            border-top-color: #4be277;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Main Splash Container -->
<main class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden">
<!-- Ambient Background Depth -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container/5 blur-[120px]"></div>
</div>
<!-- Glass Content Shell -->
<div class="relative z-10 flex flex-col items-center justify-center px-6">
<!-- Logo Container with Glassmorphism -->
<div class="relative group">
<!-- Outer Glow -->
<div class="absolute -inset-8 glass-glow opacity-50 group-hover:opacity-100 transition-opacity duration-1000"></div>
<!-- Main Logo Box -->
<div class="relative bg-surface-container-highest/40 backdrop-blur-2xl rounded-xl p-12 border border-outline-variant/10 shadow-2xl flex flex-col items-center">
<!-- Brand Anchor Logo -->
<h1 class="font-headline text-7xl font-black tracking-tighter text-primary">
                        e7gzz
                    </h1>
<!-- Premium Descriptor -->
<p class="mt-4 font-label text-[10px] uppercase tracking-[0.3em] text-on-secondary-container/60">
                        The Digital Curator
                    </p>
</div>
</div>
<!-- Focus Element: Loading Indicator -->
<div class="mt-20 flex flex-col items-center gap-6">
<!-- Minimal Loader -->
<div class="loader-ring"></div>
<!-- Status Text -->
<div class="flex flex-col items-center">
<span class="text-xs font-medium text-on-surface/40 tracking-widest uppercase">
                        Preparing your pitch
                    </span>
<!-- Progress Bar (Subtle) -->
<div class="mt-4 h-[1px] w-48 bg-surface-container-highest overflow-hidden rounded-full">
<div class="shimmer h-full w-full"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Branding Details -->
<div class="absolute bottom-12 flex flex-col items-center gap-2">
<div class="flex items-center gap-3">
<span class="w-8 h-[1px] bg-outline-variant/30"></span>
<span class="text-[10px] font-bold text-on-secondary-container/40 uppercase tracking-[0.2em]">Cairo • Dubai • Riyadh</span>
<span class="w-8 h-[1px] bg-outline-variant/30"></span>
</div>
</div>
<!-- Abstract Decorative Layers -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 -right-20 w-96 h-96 border border-primary/10 rounded-full"></div>
<div class="absolute -bottom-20 -left-20 w-80 h-80 border border-primary-container/10 rounded-full"></div>
</div>
</main>
<!-- Visual Hint of the Arena Background (Very faint) -->
<div class="fixed inset-0 z-[-1] overflow-hidden">
